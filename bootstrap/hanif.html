<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biodata Hanif</title>

<!-- Bootstrap 4 -->
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

<style>
body{
    background: linear-gradient(135deg,#87CEFA,#B0E0E6);
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;
}

/* CARD */
.profile-card{
    margin-top:60px;
    background:white;
    border-radius:25px;
    box-shadow:0 15px 30px rgba(0,0,0,0.2);
    overflow:hidden;
    display:none;
    transition:0.3s;
}

.profile-card:hover{
    transform:translateY(-5px);
}

/* HEADER */
.profile-header{
    background:linear-gradient(135deg,#42A5F5,#1E88E5);
    color:white;
    text-align:center;
    padding:30px;
}

/* FOTO */
.profile-img{
    width:150px;
    height:150px;
    border-radius:50%;
    border:5px solid white;
    object-fit:contain;
    background:white;
    transition:0.3s;
}

.profile-img:hover{
    transform:scale(1.05);
}

/* INFO */
.info-item{
    padding:15px;
    border-bottom:1px solid #eee;
    font-size:16px;
}

.info-item i{
    color:#42A5F5;
    margin-right:8px;
}

.info-item:hover{
    background:#f1f9ff;
}

/* GLOW BUTTON */
.btn-custom{
    background:#42A5F5;
    color:white;
    border:none;
    border-radius:30px;
    padding:12px 25px;
    font-weight:bold;
    transition:0.3s;
    box-shadow:0 0 10px #42A5F5;
    animation:glow 1.5s infinite alternate;
}

.btn-custom:hover{
    background:#1E88E5;
    box-shadow:0 0 20px #1E88E5;
    transform:scale(1.05);
    color:white;
}

/* ANIMASI GLOW */
@keyframes glow{
    from{
        box-shadow:0 0 5px #42A5F5;
    }
    to{
        box-shadow:0 0 20px #42A5F5;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">

            <div class="profile-card" id="card">

                <!-- HEADER -->
                <div class="profile-header">

                    <img src="shin suhyun.jpg" class="profile-img">

                    <h3 class="mt-3"><i class="fas fa-user"></i> Hanif</h3>
                    <p><i class="fas fa-code"></i> Mahasiswa Informatika</p>

                </div>

                <!-- INFO -->
                <div class="info-item">
                    <i class="fas fa-id-card"></i>
                    <b>NIM:</b> 123456789
                </div>

                <div class="info-item">
                    <i class="fas fa-user-graduate"></i>
                    <b>Kelas:</b> SI
                </div>

                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <b>Email:</b> hanif@gmail.com
                </div>

                <div class="info-item">
                    <i class="fas fa-phone"></i>
                    <b>No HP:</b> 08123456789
                </div>

                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <b>Alamat:</b> Berlin, Jerman
                </div>

                <!-- BUTTON IG -->
                <div class="text-center p-4">

                    <a href="https://www.instagram.com/fauzihsb__/"
                       target="_blank"
                       class="btn btn-custom">

                        <i class="fab fa-instagram"></i>
                        Hubungi Saya

                    </a>

                </div>

            </div>

        </div>
    </div>
</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

<script>
$(document).ready(function(){
    $("#card").fadeIn(1200);
});
</script>

</body>
</html>
